name: Python Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Versao que o Streamlit esta usando

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt
          pip install pytest # Garante que o pytest esteja la

      - name: Debug Python path
        run: |
          pwd
          ls -la
          python -c "import os, sys; print('CWD:', os.getcwd()); print('PYTHONPATH:', os.getenv('PYTHONPATH')); print('sys.path:', sys.path)"

      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests/
